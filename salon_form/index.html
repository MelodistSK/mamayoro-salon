<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>本日のセミナー アンケート｜ままよろ</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho+B1:wght@600;700&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{--gold:#eab464;--gold-strong:#f3c479;--teal-bright:#bdeffa;--ink:#f5ede0;--ink-2:#cabfae;--ink-3:#8a7f6d;
    --field:#fbf7ef;--field-ink:#1a1408;--line:rgba(245,237,224,.14);--bad:#e88;
    --serif:"Shippori Mincho B1",serif;--sans:"Zen Kaku Gothic New",system-ui,sans-serif;}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:var(--sans);color:var(--ink);line-height:1.7;-webkit-font-smoothing:antialiased;
    background:#0b1733;background-image:radial-gradient(120% 80% at 80% -10%,rgba(234,180,100,.10),transparent 55%),radial-gradient(90% 70% at 0% 0%,rgba(121,199,191,.05),transparent 50%);
    background-attachment:fixed;min-height:100vh;padding:28px 16px 60px}
  .wrap{max-width:540px;margin:0 auto}
  .kick{font-size:12px;letter-spacing:.28em;color:var(--gold);text-transform:uppercase;margin-bottom:10px}
  h1{font-family:var(--serif);font-weight:700;font-size:clamp(24px,6vw,32px);letter-spacing:.03em;line-height:1.3}
  .lead{color:var(--ink-2);font-size:14.5px;margin-top:12px}
  .lead .g{color:var(--gold-strong);font-weight:700}
  form{margin-top:24px;display:flex;flex-direction:column;gap:20px}
  .f label.fl{display:block;font-size:14px;font-weight:700;color:var(--ink);margin-bottom:9px}
  .req{color:var(--gold);font-size:11px;font-weight:700;margin-left:6px}
  .opt{color:var(--ink-3);font-size:11px;font-weight:500;margin-left:6px}
  input[type=text],input[type=email],input[type=tel],textarea{
    width:100%;font-family:var(--sans);font-size:16px;color:var(--field-ink);background:var(--field);
    border:1.5px solid transparent;border-radius:11px;padding:13px 14px;outline:none;transition:border-color .2s,box-shadow .2s}
  textarea{min-height:80px;resize:vertical;line-height:1.6}
  input:focus,textarea:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(234,180,100,.22)}

  /* 満足度スケール */
  .scale{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
  .scale .sc{position:relative;text-align:center;border:1.5px solid var(--line);border-radius:11px;padding:12px 6px;cursor:pointer;transition:.18s}
  .scale .sc:hover{border-color:rgba(234,180,100,.5)}
  .scale .sc input{position:absolute;opacity:0}
  .scale .sc .em{font-size:20px;line-height:1}
  .scale .sc .lb{display:block;font-size:11.5px;color:var(--ink-2);margin-top:6px}
  .scale .sc:has(input:checked){border-color:var(--gold);background:rgba(234,180,100,.12)}
  .scale .sc:has(input:checked) .lb{color:var(--gold-strong);font-weight:700}

  /* 次アクション（二段構え・上2つを主役に） */
  .seg{display:flex;flex-direction:column;gap:10px}
  .seg-o{position:relative;display:block;border:1.5px solid var(--line);border-radius:13px;padding:16px 16px 16px 52px;cursor:pointer;transition:.18s}
  .seg-o:hover{border-color:rgba(234,180,100,.55)}
  .seg-o input{position:absolute;opacity:0}
  .seg-o .rd{position:absolute;left:16px;top:50%;transform:translateY(-50%);width:20px;height:20px;border-radius:50%;border:2px solid var(--ink-3);transition:.18s}
  .seg-o .st{font-weight:700;font-size:16px;color:var(--ink)}
  .seg-o .ss{display:block;font-size:12.5px;color:var(--ink-3);margin-top:3px}
  .seg-o input:checked~.rd{border-color:var(--gold);background:radial-gradient(circle at center,var(--gold) 0 6px,transparent 7px)}
  .seg-o.hot{background:rgba(234,180,100,.06)}
  .seg-o.hot .st{color:var(--gold-strong)}
  .seg-o:has(input:checked){border-color:var(--gold);background:rgba(234,180,100,.13);box-shadow:0 6px 20px rgba(234,180,100,.14)}
  .seg-o.soft{padding:13px 16px 13px 46px;opacity:.92}
  .seg-o.soft .rd{width:18px;height:18px;left:16px}
  .seg-o.soft .st{font-size:14px;font-weight:500;color:var(--ink-2)}

  .reveal-x{display:none}
  .consent{display:flex;align-items:flex-start;gap:11px;font-size:13.5px;color:var(--ink-2)}
  .consent input{flex:0 0 auto;width:20px;height:20px;margin-top:2px;accent-color:var(--gold)}
  .consent a{color:var(--gold-strong)}
  .btn{font-family:var(--sans);font-weight:700;font-size:17px;color:#1a1408;background:linear-gradient(180deg,var(--gold-strong),var(--gold));
    border:none;border-radius:100px;padding:16px;cursor:pointer;box-shadow:0 10px 28px rgba(234,180,100,.28);transition:transform .2s,opacity .2s;margin-top:2px}
  .btn:hover{transform:translateY(-2px)} .btn:disabled{opacity:.55;transform:none;cursor:default}
  .note{font-size:11.5px;color:var(--ink-3);text-align:center;margin-top:2px}
  .err{color:var(--bad);font-size:13px;min-height:1px}
  .thanks{display:none;text-align:center;padding:54px 16px}
  .thanks .ic{width:64px;height:64px;border-radius:50%;border:2px solid var(--gold);display:flex;align-items:center;justify-content:center;margin:0 auto 22px}
  .thanks .ic svg{width:30px;height:30px;stroke:var(--gold)}
  .thanks h2{font-family:var(--serif);font-weight:700;font-size:24px;color:var(--ink)}
  .thanks p{color:var(--ink-2);font-size:14.5px;margin-top:12px}
  .foot{margin-top:30px;text-align:center;font-size:11px;letter-spacing:.1em;color:var(--ink-3)}
</style>
</head>
<body>
<div class="wrap">
  <div id="card">
    <div class="kick">本日はありがとうございました</div>
    <h1>セミナー アンケート</h1>

    <form id="form" novalidate>
      <!-- ▼ 開催回メタ（訪問先ごとに変更可） -->
      <input type="hidden" name="event_id" value="MMYS-VISIT">
      <input type="hidden" name="event_ym" value="2026-08">
      <input type="hidden" name="series"   value="ままよろ 出張セミナー">
      <input type="hidden" name="kind"     value="セミナーアンケート">
      <input type="hidden" name="source"   value="セミナーアンケート">

      <!-- 1. 満足度 -->
      <div class="f"><label class="fl">本日の内容はいかがでしたか？<span class="req">必須</span></label>
        <div class="scale">
          <label class="sc"><input type="radio" name="satisfaction" value="とても満足" required><span class="em">🤩</span><span class="lb">とても満足</span></label>
          <label class="sc"><input type="radio" name="satisfaction" value="満足"><span class="em">😊</span><span class="lb">満足</span></label>
          <label class="sc"><input type="radio" name="satisfaction" value="ふつう"><span class="em">🙂</span><span class="lb">ふつう</span></label>
          <label class="sc"><input type="radio" name="satisfaction" value="物足りない"><span class="em">🤔</span><span class="lb">物足りない</span></label>
        </div>
      </div>

      <!-- 2. 次のアクション（誘導） -->
      <div class="f"><label class="fl">今日をきっかけに、次にやってみたいことは？<span class="req">必須</span></label>
        <div class="seg">
          <label class="seg-o hot"><input type="radio" name="direction" value="もっと学びたい" required><span class="rd"></span>
            <span class="st">もっと学びたい</span><span class="ss">社内で“仕組み化”できるように。実践講座・勉強会のご案内を受け取る。</span></label>
          <label class="seg-o hot"><input type="radio" name="direction" value="サポートしてほしい"><span class="rd"></span>
            <span class="st">うちの状況も見て、サポートしてほしい</span><span class="ss">“効く一カ所”を一緒に。まずは無料の個別相談から。</span></label>
          <label class="seg-o soft"><input type="radio" name="direction" value="情報だけ"><span class="rd"></span>
            <span class="st">まずは資料・情報だけ受け取りたい</span></label>
        </div>
      </div>

      <!-- 3. 状況ヒアリング（学びたい/サポート希望のときだけ表示） -->
      <div class="f reveal-x" id="concernBlock"><label class="fl">いま気になっていること・自動化したい業務<span class="opt">任意</span></label>
        <textarea name="concern" placeholder="例：毎月の請求書づくりに時間がかかる／問い合わせ対応を効率化したい など"></textarea></div>

      <!-- 4. お名前 -->
      <div class="f"><label class="fl">お名前<span class="req">必須</span></label>
        <input type="text" name="name" autocomplete="name" required></div>

      <label class="consent"><input type="checkbox" name="consent" value="同意" required>
        <span><a href="privacy.html" target="_blank" rel="noopener">個人情報の取り扱い</a>に同意します<span class="req">必須</span></span></label>

      <div class="err" id="err"></div>
      <button class="btn" id="btn" type="submit">送信する</button>
      <div class="note">いただいた内容は、今後のご案内の参考にのみ使用します。</div>
    </form>
  </div>

  <div class="thanks" id="thanks">
    <div class="ic"><svg viewBox="0 0 24 24" fill="none" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12l5 5L20 6"/></svg></div>
    <h2 id="thanksTitle">ご回答、ありがとうございます。</h2>
    <p id="thanksMsg">ご回答は、今後のご案内の参考にさせていただきます。</p>
  </div>

  <div class="foot">© ままよろ</div>
</div>

<script>
(function(){
  // ▼▼ Apps Script の「ウェブアプリ」URL（READMEの手順参照）▼▼
  var ENDPOINT = "https://script.google.com/macros/s/AKfycbyiE9rXzcGHQ8daHN2aFLJ2y1A_JGw-WSjOS9JSSgSfTXFEsNGEWGJr0K8M3VQdvqHBYg/exec";
  var form=document.getElementById('form'), btn=document.getElementById('btn'), err=document.getElementById('err'),
      card=document.getElementById('card'), thanks=document.getElementById('thanks'),
      thanksMsg=document.getElementById('thanksMsg'), concernBlock=document.getElementById('concernBlock');

  // 「学びたい」「サポート」を選んだときだけ、状況ヒアリングを表示
  form.addEventListener('change', function(e){
    if(e.target && e.target.name==='direction'){
      concernBlock.style.display = (e.target.value==='情報だけ') ? 'none' : 'block';
    }
  });

  var MSG = {
    'もっと学びたい':'学びの次のステップ（実践講座・勉強会）について、追ってご案内します。',
    'サポートしてほしい':'御社の状況を伺う個別相談について、追ってご案内します。',
    '情報だけ':'資料と今後のご案内をご用意します。'
  };

  function showThanks(dir){
    if(MSG[dir]) thanksMsg.textContent = MSG[dir];
    card.style.display='none'; thanks.style.display='block'; window.scrollTo({top:0,behavior:'smooth'});
  }

  form.addEventListener('submit', function(e){
    e.preventDefault(); err.textContent='';
    if(!form.checkValidity()){ form.reportValidity(); return; }
    var dir=(form.querySelector('input[name=direction]:checked')||{}).value||'';
    var data = new URLSearchParams(new FormData(form));
    btn.disabled=true; var label=btn.textContent; btn.textContent='送信中…';
    if(!ENDPOINT){ console.log('[demo] 送信内容:', Object.fromEntries(data)); showThanks(dir); return; }
    fetch(ENDPOINT, { method:'POST', mode:'no-cors', body:data })
      .then(function(){ showThanks(dir); })
      .catch(function(){ btn.disabled=false; btn.textContent=label; err.textContent='送信に失敗しました。通信環境をご確認のうえ、もう一度お試しください。'; });
  });
})();
</script>
</body>
</html>
